<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Core</title>
<style>
  html,body{margin:0;height:100%;background:#0d0d12;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#16161e;display:block;}
  #hint{position:fixed;bottom:8px;left:0;right:0;text-align:center;
    color:#555;font:12px monospace;pointer-events:none;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hint">WASD/arrows move · space shoot · Q swap · Shift dash · 1-3 pick &nbsp;·&nbsp; mobile: on-screen controls</div>
<script>
// ============================================================
//  VERTICAL ROGUELITE — CORE SKELETON
//  Everything on screen is an Entity with components.
//  A hero, an enemy, and a bullet are the SAME thing with
//  different components. This is the part to understand first.
//
//  Prior iteration: tile-grid map, cover walls, COMBAT/INTERMISSION
//  wave loop, between-wave upgrade pick.
//
//  PHASE 1 — combat core:
//   - Weapons are DATA ({kind, damage, cooldown, manaCost, ...}); one
//     fire system dispatches on `kind`. Hero holds TWO weapons, one
//     active; tap / Q / Tab swaps.
//   - ranged: spawns projectiles, costs energy. melee: a free arc
//     swing that damages enemies AND destroys enemy bullets in the
//     arc (attack + shield).
//   - energy economy: ranged spends energy; energy drops from kills
//     (collectible orbs) and regenerates passively, ramping the
//     longer you're starved so you're never locked out of ranged.
//  Projectile params are read from weapon data so later buffs can
//  modify them at spawn without touching the fire path.
// ============================================================

// ---------- Canvas (portrait, fits iPhone) ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
// logical resolution — game thinks in these units, not pixels
const VW = 360, VH = 640;            // virtual width/height (portrait)
function fit() {
  const scale = Math.min(window.innerWidth / VW, window.innerHeight / VH);
  const dpr = window.devicePixelRatio || 1;
  // backing buffer at PHYSICAL pixels so high-DPI (retina) screens stay sharp
  canvas.width  = Math.round(VW * dpr);
  canvas.height = Math.round(VH * dpr);
  // displayed (CSS) size is still the fitted logical size — unchanged
  canvas.style.width  = (VW * scale) + 'px';
  canvas.style.height = (VH * scale) + 'px';
  // assigning canvas.width/height above RESETS the context transform, so set
  // the dpr scale once here: all drawing stays in logical VW×VH coords and the
  // scale never accumulates across resizes.
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
fit(); window.addEventListener('resize', fit);

// ============================================================
//  TILE GRID
//  The map is a 2D array of cells, each FLOOR or WALL. ALL
//  collision/geometry goes through this grid (never arbitrary
//  rectangles) so it can later be fed to an RL agent as an array
//  and support grid pathfinding. 18px tiles divide the 360-wide
//  canvas exactly (20 cols). 35 rows = 630px tall; the lower
//  ~10px is covered by the bottom wall border so it never shows.
// ============================================================
const TILE = 18;
const COLS = Math.floor(VW / TILE);   // 20
const ROWS = Math.floor(VH / TILE);   // 35
const FLOOR = 0, WALL = 1;
const HERO_R = 9;                     // agent collision radius (hero & enemies)
let grid = [];                        // grid[row][col]

// pixel -> cell helpers. Out-of-bounds counts as WALL so the
// world edge needs no special-casing.
const cellOf = px => Math.floor(px / TILE);
function isWallCell(c, r){
  if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return true;
  return grid[r][c] === WALL;
}
const isWallPx = (x, y) => isWallCell(cellOf(x), cellOf(y));
// A circle hits a wall if its centre OR any of its 4 cardinal
// edge points is in a wall cell. 5 O(1) lookups — NOT a loop
// over every wall (that's the thing the grid exists to avoid).
function circleHitsWall(x, y, r){
  return isWallPx(x, y)
      || isWallPx(x - r, y) || isWallPx(x + r, y)
      || isWallPx(x, y - r) || isWallPx(x, y + r);
}
const cellCenter = (c, r) => ({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2 });
const ri = n => Math.floor(Math.random() * n);   // random int 0..n-1
// smallest absolute angle between two headings (handles wraparound)
function angleDiff(a, b){ let d = Math.abs(a - b) % (Math.PI * 2); if (d > Math.PI) d = Math.PI * 2 - d; return d; }

// ---------- Map generation ----------
// Primitive cover: a border ring of wall, then 4-8 scattered
// rect / L-shaped obstacles. NOT a maze, NOT a dungeon. Two hard
// rules: a safe zone around the hero stays floor, and the map is
// fully connected (verified by flood-fill; regenerate if not).
function blankGrid(){
  grid = [];
  for (let r = 0; r < ROWS; r++){
    const row = [];
    for (let c = 0; c < COLS; c++){
      const border = (c === 0 || r === 0 || c === COLS - 1 || r === ROWS - 1);
      row.push(border ? WALL : FLOOR);
    }
    grid.push(row);
  }
}
function carveSafeZone(c, r, rad){
  // force a floor pocket around a cell (keep the outer border intact)
  for (let y = Math.max(1, r - rad); y <= Math.min(ROWS - 2, r + rad); y++)
    for (let x = Math.max(1, c - rad); x <= Math.min(COLS - 2, c + rad); x++)
      grid[y][x] = FLOOR;
}
const OBST_MARGIN = 2;   // min floor gap (tiles) kept around every obstacle, so
                         // passages stay >= 2 tiles wide. A 1-tile gap is floor
                         // but too narrow for the hero's diameter (~= a tile).
function regionAllFloor(c0, r0, c1, r1){
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++){
      if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return false;  // hits the border/edge
      if (grid[r][c] !== FLOOR) return false;                      // overlaps a wall/obstacle margin
    }
  return true;
}
// Stamp one rect/L obstacle, but only if a clear floor margin surrounds it
// (so every passage is >= OBST_MARGIN wide). Returns whether it placed.
function tryPlaceObstacle(){
  const w = 2 + ri(3), h = 2 + ri(3);              // 2..4 tiles each side
  const c0 = 1 + ri(COLS - 2 - w);                 // stay off the border
  const r0 = 1 + ri(ROWS - 2 - h);
  const m = OBST_MARGIN;
  if (!regionAllFloor(c0 - m, r0 - m, c0 + w - 1 + m, r0 + h - 1 + m)) return false;
  for (let r = r0; r < r0 + h; r++)
    for (let c = c0; c < c0 + w; c++)
      grid[r][c] = WALL;
  // 50% of the time bite one corner back to floor -> an L / notch
  if (Math.random() < 0.5){
    const cw = 1 + ri(w - 1), ch = 1 + ri(h - 1);
    const cornerC = Math.random() < 0.5 ? c0 : c0 + w - cw;
    const cornerR = Math.random() < 0.5 ? r0 : r0 + h - ch;
    for (let r = cornerR; r < cornerR + ch; r++)
      for (let c = cornerC; c < cornerC + cw; c++)
        grid[r][c] = FLOOR;
  }
  return true;
}
// Flood-fill of reachable FLOOR cells from a start cell (4-dir).
function floodReachable(sc, sr){
  const seen = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
  const cells = [];
  if (grid[sr][sc] !== FLOOR) return { seen, cells };
  const stack = [[sc, sr]]; seen[sr][sc] = true;
  while (stack.length){
    const [c, r] = stack.pop(); cells.push([c, r]);
    const nb = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dc, dr] of nb){
      const nc = c + dc, nr = r + dr;
      if (nc < 0 || nr < 0 || nc >= COLS || nr >= ROWS) continue;
      if (seen[nr][nc] || grid[nr][nc] !== FLOOR) continue;
      seen[nr][nc] = true; stack.push([nc, nr]);
    }
  }
  return { seen, cells };
}
function countFloor(){
  let n = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === FLOOR) n++;
  return n;
}
// A cell is "standable" if a circle of the agent radius, centred in it, doesn't
// touch a wall — i.e. the hero can actually occupy it. (A 1-tile gap is floor
// but NOT standable: the hero's diameter ~= a tile.) Uses the SAME
// circleHitsWall the movement code uses, so generation and physics agree.
function cellStandable(c, r, rad){
  const p = cellCenter(c, r);
  return !circleHitsWall(p.x, p.y, rad);
}
// Flood-fill over STANDABLE cells (4-dir). Cardinally-adjacent standable cells
// are always traversable, so this models where the hero can really go.
function floodStandable(sc, sr, rad){
  const seen = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
  const cells = [];
  if (grid[sr][sc] !== FLOOR || !cellStandable(sc, sr, rad)) return { seen, cells };
  const stack = [[sc, sr]]; seen[sr][sc] = true;
  while (stack.length){
    const [c, r] = stack.pop(); cells.push([c, r]);
    for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc = c + dc, nr = r + dr;
      if (nc < 0 || nr < 0 || nc >= COLS || nr >= ROWS) continue;
      if (seen[nr][nc] || grid[nr][nc] !== FLOOR || !cellStandable(nc, nr, rad)) continue;
      seen[nr][nc] = true; stack.push([nc, nr]);
    }
  }
  return { seen, cells };
}
function countStandable(rad){
  let n = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === FLOOR && cellStandable(c, r, rad)) n++;
  return n;
}
// The hero may sit on a floor cell whose CENTRE is wall-adjacent (e.g. hugging
// the border): a valid pixel position, but not "standable" by cell centre. Find
// the nearest standable cell (BFS) to use as the flood origin / hero footing.
function standableStart(c, r, rad){
  const seen = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
  const q = [[c, r]];
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) seen[r][c] = true;
  while (q.length){
    const [cc, rr] = q.shift();
    if (cc>=0 && rr>=0 && cc<COLS && rr<ROWS && grid[rr][cc] === FLOOR && cellStandable(cc, rr, rad)) return [cc, rr];
    for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc = cc+dc, nr = rr+dr;
      if (nc<0 || nr<0 || nc>=COLS || nr>=ROWS || seen[nr][nc]) continue;
      seen[nr][nc] = true; q.push([nc, nr]);
    }
  }
  return null;
}
// Build a map the hero can physically traverse. Connectivity is RADIUS-AWARE:
// flood over standable cells, not just floor cells — a 1-tile gap is floor-
// connected but too narrow for the hero. Regenerate until every standable cell
// is reachable from the hero. Returns standable+reachable cells (enemy spawns
// use them, so nothing spawns where the hero can't reach).
function generateMap(heroC, heroR){
  const want = 4 + ri(5);              // aim for 4..8 obstacles
  for (let attempt = 0; attempt < 40; attempt++){
    blankGrid();
    let placed = 0, tries = 0;
    while (placed < want && tries < 60){ tries++; if (tryPlaceObstacle()) placed++; }
    carveSafeZone(heroC, heroR, 2);    // never trap the hero
    const start = standableStart(heroC, heroR, HERO_R);
    if (!start) continue;
    const { cells } = floodStandable(start[0], start[1], HERO_R);
    // good == every standable cell is reachable from the hero (no walled-in pockets)
    if (cells.length === countStandable(HERO_R)) return cells;
  }
  // Fallback: border-only arena is trivially traversable.
  blankGrid();
  carveSafeZone(heroC, heroR, 2);
  const s = standableStart(heroC, heroR, HERO_R) || [heroC, heroR];
  return floodStandable(s[0], s[1], HERO_R).cells;
}

// ---------- Input ----------
// One game logic, two frontends: desktop keyboard/mouse and a mobile
// on-screen control layer. Both only produce the SHARED signals below
// (moveVec, fireHeld) and call the same actions — never duplicated logic.
const keys = {};
let moveVec = { x:0, y:0, active:false };  // movement direction (joystick / mouse-drag)
let fireHeld = false;                      // FIRE held via the mobile attack button

// Touch device? If so, show the on-screen controls and route touches through
// them. On desktop they stay hidden and keyboard + mouse drive play.
const TOUCH = (typeof window !== 'undefined') &&
  (('ontouchstart' in window) || (typeof navigator !== 'undefined' && navigator.maxTouchPoints > 0));

function toLocal(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)/(r.width/VW), y:(t.clientY-r.top)/(r.height/VH) };
}

// On-screen controls geometry (data, shared by hit-testing and rendering).
// Floating left joystick + a compact right cluster of 3 buttons (portrait).
const JOY = { r:46, kr:22, dead:8, id:null, baseX:0, baseY:0, curX:0, curY:0, active:false };
const BTN = {
  attack:  { x:VW-52,  y:VH-58,  r:34, label:'FIRE'  },
  ability: { x:VW-116, y:VH-92,  r:24, label:'SKILL' },
  swap:    { x:VW-66,  y:VH-150, r:22, label:'SWAP'  },
};
let attackTouchId = null;   // identifier of the touch currently holding ATTACK
const hitBtn = (p, b) => Math.hypot(p.x-b.x, p.y-b.y) <= b.r;

// Multi-touch: every touch is tracked by its identifier, so the joystick
// (left thumb) and a button (right thumb) work AT THE SAME TIME — one touch
// never steals or cancels another.
canvas.addEventListener('touchstart', e=>{ e.preventDefault();
  for(const t of e.changedTouches){
    const p = toLocal(t);
    if(hero.dead){ resetWorld(); return; }
    if(round.state === 'INTERMISSION'){ tapChoice(p.x, p.y); continue; }
    // right-side action buttons
    if(hitBtn(p, BTN.attack)){ attackTouchId = t.identifier; fireHeld = true; continue; }
    if(hitBtn(p, BTN.ability)){ useAbility(); continue; }
    if(hitBtn(p, BTN.swap)){ swapWeapon(); continue; }
    // left half = floating joystick (one at a time)
    if(p.x < VW*0.5 && !JOY.active){
      JOY.id = t.identifier; JOY.baseX = JOY.curX = p.x; JOY.baseY = JOY.curY = p.y; JOY.active = true;
      moveVec.active = true; moveVec.x = 0; moveVec.y = 0;
    }
  }
},{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier !== JOY.id || !JOY.active) continue;
    const p = toLocal(t);
    let dx = p.x-JOY.baseX, dy = p.y-JOY.baseY;
    const len = Math.hypot(dx,dy);
    if(len > JOY.r){ dx = dx/len*JOY.r; dy = dy/len*JOY.r; }   // clamp stick to the ring
    JOY.curX = JOY.baseX+dx; JOY.curY = JOY.baseY+dy;
    if(len < JOY.dead){ moveVec.x = 0; moveVec.y = 0; }         // centre dead zone
    else { const u = Math.hypot(dx,dy)||1; moveVec.x = dx/u; moveVec.y = dy/u; }  // unit direction
  }
},{passive:false});
function endTouch(e){ e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === JOY.id){ JOY.active = false; JOY.id = null; moveVec.active = false; moveVec.x = 0; moveVec.y = 0; }
    if(t.identifier === attackTouchId){ attackTouchId = null; fireHeld = false; }
  }
}
canvas.addEventListener('touchend', endTouch, {passive:false});
canvas.addEventListener('touchcancel', endTouch, {passive:false});

// Desktop mouse: menus (restart / pick) always; in combat, drag = move and
// hold = fire, a quick click = swap. (Keyboard stays the primary desktop path.)
let mouseDown = false, mouseOrigin = null, mouseStartT = 0, mouseDragged = false;
canvas.addEventListener('mousedown', e=>{
  const p = toLocal(e);
  if(hero.dead){ resetWorld(); return; }              // click to restart
  if(round.state === 'INTERMISSION'){ tapChoice(p.x, p.y); return; }
  mouseDown = true; mouseOrigin = p; mouseStartT = performance.now(); mouseDragged = false;
  moveVec.active = true; moveVec.x = 0; moveVec.y = 0;
});
canvas.addEventListener('mousemove', e=>{
  if(!mouseDown || round.state !== 'COMBAT') return;
  const p = toLocal(e);
  let dx = p.x-mouseOrigin.x, dy = p.y-mouseOrigin.y;
  const len = Math.hypot(dx,dy)||1;
  if(len>8) mouseDragged = true;
  if(len>4){ moveVec.x = dx/len; moveVec.y = dy/len; }
  else { moveVec.x = 0; moveVec.y = 0; }
});
window.addEventListener('mouseup', ()=>{   // window: releasing off-canvas still ends the drag
  if(round.state==='COMBAT' && !hero.dead && !mouseDragged && (performance.now()-mouseStartT) < 220)
    swapWeapon();
  mouseDown = false; mouseOrigin = null; moveVec.active = false; moveVec.x = 0; moveVec.y = 0;
});

addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (hero.dead && k === 'r'){ resetWorld(); return; }
  if (round.state === 'INTERMISSION'){
    if (k === '1') pickChoice(0);
    else if (k === '2') pickChoice(1);
    else if (k === '3') pickChoice(2);
    return;
  }
  if (round.state === 'COMBAT'){
    if (k === 'q' || k === 'tab'){ e.preventDefault(); swapWeapon(); }
    else if (k === 'shift'){ e.preventDefault(); useAbility(); }   // dash
  }
});
addEventListener('keyup', e=> keys[e.key.toLowerCase()] = false);

// ---------- World: just a flat list of entities ----------
let entities = [];
const add = e => { entities.push(e); return e; };

// ============================================================
//  WEAPONS (data-driven)
//  A weapon is plain data + a `kind`. fireActive() dispatches on
//  kind. The hero holds an array of weapons and an active index.
//  Projectile params live on the weapon (not the hero) so a later
//  buff can change bullet size/count/speed at spawn time.
// ============================================================
function makeRanged(){
  return {
    kind:'ranged', name:'Blaster',
    damage:12, cooldown:0.18, cooldownLeft:0,
    manaCost:6,                       // energy spent per shot
    bulletSpeed:380, bulletCount:1, spread:0.30, bulletRadius:4,
  };
}
function makeMelee(){
  return {
    kind:'melee', name:'Blade',
    damage:26, cooldown:0.34, cooldownLeft:0,
    manaCost:0,                       // melee is always free
    arcRadius:46, arcHalf:1.0,        // reach (px) + half-angle (rad ~57deg each side)
  };
}
// Abilities are DATA too (same spirit as weapons), held in hero.ability. Only
// the dash is populated now; a second ability later = more data + an effect
// branch in useAbility(). All numbers are tunable placeholders.
function makeDash(){
  return {
    kind:'dash', name:'Dash',
    cooldown:1.1, cooldownLeft:0,
    duration:0.14,    // seconds of the high-velocity slide
    speed:560,        // px/sec while dashing (~4x walk) -> ~78px per dash
    iframes:0.14,     // invuln window (here = whole dash; tunable)
  };
}

// ---------- Energy economy tunables (placeholders — tune by feel) ----------
const ENERGY_REGEN_BASE = 8;     // energy/sec baseline regen
const ENERGY_REGEN_RAMP = 14;    // extra energy/sec for each second starved
const ENERGY_REGEN_MAX  = 70;    // cap on regen rate
const ORB_VALUE = 10;            // energy restored per pickup
const ORB_MAGNET = 46;           // px: orbs within this drift toward hero
const ORB_PULL   = 170;          // px/sec orb drift speed

// Factory functions build entities by composing components.
// Components are just data fields — behaviour lives in systems below.
function makeHero(){
  return {
    tag:'hero',
    x:VW/2, y:VH*0.75, r:HERO_R,
    vx:0, vy:0, speed:140,
    hp:100, maxHp:100,
    energy:100, maxEnergy:100, starveTimer:0,
    weapons:[ makeRanged(), makeMelee() ],
    activeWeapon:0,
    aimX:0, aimY:-1,                  // last aim/face direction (melee + dash use this)
    meleeFx:null,                     // transient swing visual {angle,half,radius,t,tMax}
    lastMoveX:0, lastMoveY:0,         // movement-input dir this frame (dash reads it at trigger)
    ability:makeDash(),               // single ability slot (data)
    dashTimer:0, dashX:0, dashY:0, dashSpeed:0,   // active-dash state, locked at trigger
    invuln:false, invulnTimer:0,      // i-frames; damage sources must check !invuln
    color:'#5ad1ff', dead:false,
  };
}
// An enemy is DATA (stats) + a brain. makeEnemy builds one by kind; the brain
// decides actions and a system applies them (see the brain seam below).
function makeEnemy(x, y, kind){
  const base = { tag:'enemy', kind:kind||'charger', x, y, r:HERO_R, dead:false,
                 touchCooldown:0, attackCdLeft:0, windupLeft:0 };
  switch(base.kind){
    case 'kiter':
      // medium HP; keeps distance and shoots projectiles at the hero
      return { ...base, brain:kiterBrain, speed:62, hp:26, maxHp:26, touchDmg:0,
               preferred:150, shootRange:240, attackCooldown:1.3,
               shotDmg:7, shotSpeed:210, shotRadius:4, color:'#ffc24a' };
    case 'heavy':
      // slow, tanky; telegraphed wind-up then a heavy short-range hit
      return { ...base, brain:heavyBrain, speed:34, hp:70, maxHp:70, touchDmg:0,
               windRange:38, attackCooldown:2.2, windup:0.5, hitRange:32,
               heavyDmg:26, color:'#b06bff' };
    case 'charger': default:
      // fast, fragile; rushes the hero, deals contact damage
      return { ...base, kind:'charger', brain:chargerBrain, speed:95,
               hp:18, maxHp:18, touchDmg:8, color:'#ff5a78' };
  }
}
function makeBullet(x,y,dx,dy,owner,dmg,speed,radius){
  return {
    tag:'bullet',
    x, y, r:radius,
    vx:dx, vy:dy, speed:speed,
    life:1.2,                         // seconds before despawn
    dmg:dmg, owner,
    color: owner==='hero' ? '#fff2a8' : '#ff9a5a', dead:false,
  };
}
function spawnEnergyOrb(x, y){
  add({ tag:'orb', x, y, r:5, value:ORB_VALUE, dead:false, color:'#7cffd0' });
}

// ---------- Combat helpers ----------
// Apply damage to an enemy in ONE place, so every damage source
// (bullets, melee) shares the same death path — incl. dropping an
// energy orb on kill.
function hurtEnemy(e, dmg){
  if (e.dead) return;
  e.hp -= dmg;
  if (e.hp <= 0){ e.dead = true; spawnEnergyOrb(e.x, e.y); }
}
// Fire the active weapon if its cooldown is ready. Per-kind handlers
// return whether they actually fired, so we only spend the cooldown
// on a real action (ranged with no energy fires nothing).
function fireActive(){
  const w = hero.weapons[hero.activeWeapon];
  if (w.cooldownLeft > 0) return;
  let fired = false;
  if (w.kind === 'ranged') fired = fireRanged(w);
  else if (w.kind === 'melee') fired = fireMelee(w);
  if (fired) w.cooldownLeft = w.cooldown;
}
function fireRanged(w){
  if (hero.energy < w.manaCost) return false;     // not enough energy -> no shot
  hero.energy -= w.manaCost;
  // fan bulletCount pellets across `spread` radians around the aim
  const base = Math.atan2(hero.aimY, hero.aimX), n = w.bulletCount;
  for(let i=0;i<n;i++){
    const t = n===1 ? 0 : (i/(n-1) - 0.5);   // -0.5..0.5
    const a = base + t*w.spread;
    add(makeBullet(hero.x, hero.y, Math.cos(a), Math.sin(a), 'hero', w.damage, w.bulletSpeed, w.bulletRadius));
  }
  return true;
}
// Melee swing: one arc in the aim direction. Damages enemies in the
// arc AND destroys enemy bullets in the arc — it is attack + shield.
// (Enemy bullets don't exist until Phase 3; the block is built now.)
function fireMelee(w){
  const baseAngle = Math.atan2(hero.aimY, hero.aimX);
  for (const e of entities){
    if (e.dead) continue;
    if (e.tag !== 'enemy' && !(e.tag === 'bullet' && e.owner === 'enemy')) continue;
    const dx = e.x - hero.x, dy = e.y - hero.y, d = Math.hypot(dx, dy);
    if (d > w.arcRadius + e.r) continue;                       // out of reach
    if (angleDiff(Math.atan2(dy, dx), baseAngle) > w.arcHalf) continue;  // outside the arc
    if (e.tag === 'enemy') hurtEnemy(e, w.damage);
    else e.dead = true;                                        // enemy bullet blocked
  }
  hero.meleeFx = { angle:baseAngle, half:w.arcHalf, radius:w.arcRadius, t:0.12, tMax:0.12 };
  return true;
}
function swapWeapon(){
  if (hero.dead) return;
  hero.activeWeapon = (hero.activeWeapon + 1) % hero.weapons.length;
}
// Ability hook — wired to the mobile SKILL button and the desktop Shift key.
// General: if an ability is equipped and ready, run its effect (by kind) and
// start its cooldown. A second ability later = another kind branch here.
function useAbility(){
  const ab = hero.ability;
  if(!ab || hero.dead || ab.cooldownLeft > 0) return;
  let used = false;
  if(ab.kind === 'dash') used = startDash(ab);
  if(used) ab.cooldownLeft = ab.cooldown;
}
// Dash: lock a direction now and slide fast for `duration`. Direction = current
// movement input if moving, else the aim/face direction. The per-frame movement
// (and wall collision) happens in sysHeroControl, reusing moveWithWalls.
function startDash(ab){
  let dx = hero.lastMoveX, dy = hero.lastMoveY;                // moving? dash where you steer
  if(dx === 0 && dy === 0){ dx = hero.aimX; dy = hero.aimY; }  // else dash where you face
  const l = Math.hypot(dx, dy) || 1;
  hero.dashX = dx/l; hero.dashY = dy/l;                        // locked — no mid-dash steering
  hero.dashTimer = ab.duration;
  hero.dashSpeed = ab.speed;
  hero.invulnTimer = ab.iframes; hero.invuln = ab.iframes > 0;
  return true;
}

// ============================================================
//  ROUND STATE MACHINE
//  COMBAT --(all enemies dead)--> INTERMISSION (10s, paused,
//  pick an upgrade) --> COMBAT (next wave, new map). Explicit
//  state, not ad-hoc flags: floors and bosses-every-N-waves will
//  hang off this later.
// ============================================================
const INTERMISSION_TIME = 10;
const round = { state:'COMBAT', timer:0, wave:0 };
let hero;

function resetWorld(){
  entities = [];
  hero = add(makeHero());
  round.wave = 0;
  startCombat();
}
// Begin a wave: drop everything but the hero, build a fresh map
// around wherever the hero is standing, spawn enemies on it.
function startCombat(){
  round.wave++;
  entities = entities.filter(e => e.tag === 'hero');
  const hc = cellOf(hero.x), hr = cellOf(hero.y);
  const reachable = generateMap(hc, hr);
  spawnWave(Math.min(4 + round.wave, 14), reachable, hc, hr);
  round.state = 'COMBAT';
}
function enterIntermission(){
  round.state = 'INTERMISSION';
  round.timer = INTERMISSION_TIME;
  // clear shots and uncollected orbs so they don't carry across waves
  entities = entities.filter(e => e.tag !== 'bullet' && e.tag !== 'orb');
  moveVec = {x:0,y:0,active:false}; JOY.active = false; JOY.id = null;
  fireHeld = false; attackTouchId = null; mouseDown = false;
  rollChoices();
}
// Enemies spawn only on reachable floor cells, kept away from the
// hero so they don't appear on top of the player.
// Weighted archetype mix (chargers common, heavy rare). Spawn tuning and
// mini-waves are the next phase; a random mix is enough now.
const SPAWN_MIX = ['charger','charger','charger','kiter','kiter','heavy'];
function spawnWave(n, reachable, hc, hr){
  let far = reachable.filter(([c,r]) => Math.hypot(c-hc, r-hr) >= 6);
  if (far.length < n) far = reachable.filter(([c,r]) => Math.hypot(c-hc, r-hr) >= 3);
  if (far.length === 0) far = reachable.slice();
  for (let i = 0; i < n; i++){
    const [c, r] = far[ri(far.length)];
    const p = cellCenter(c, r);
    add(makeEnemy(p.x, p.y, SPAWN_MIX[ri(SPAWN_MIX.length)]));
  }
}

// ---------- Between-wave choices ----------
// Hardcoded pool. No currency, no shop — pick one, it applies,
// next wave. Weapon upgrades target the ranged weapon's data.
const rangedOf = h => h.weapons.find(w => w.kind === 'ranged');
const CHOICE_POOL = [
  { name:'+ Damage',    desc:'+6 ranged damage',   apply:h => { rangedOf(h).damage += 6; } },
  { name:'+ Fire Rate', desc:'20% faster ranged',  apply:h => { const w=rangedOf(h); w.cooldown = Math.max(0.05, w.cooldown * 0.8); } },
  { name:'Heal',        desc:'restore 40 HP',      apply:h => { h.hp = Math.min(h.maxHp, h.hp + 40); } },
  { name:'+ Vigor',     desc:'+20 max HP & heal',  apply:h => { h.maxHp += 20; h.hp += 20; } },
];
let choices = [];        // the 3 offered this intermission
let choiceRects = [];    // their on-screen hitboxes (for tapping)
function rollChoices(){
  const pool = CHOICE_POOL.slice();
  choices = [];
  for (let i = 0; i < 3 && pool.length; i++)
    choices.push(pool.splice(ri(pool.length), 1)[0]);
  // layout: stacked cards, centred
  choiceRects = choices.map((ch, i) => ({
    x: 28, y: 170 + i * 74, w: VW - 56, h: 60, choice: ch,
  }));
}
function pickChoice(i){
  if (round.state !== 'INTERMISSION') return;
  const ch = choices[i];
  if (!ch) return;
  ch.apply(hero);
  startCombat();
}
function tapChoice(x, y){
  for (let i = 0; i < choiceRects.length; i++){
    const c = choiceRects[i];
    if (x >= c.x && x <= c.x + c.w && y >= c.y && y <= c.y + c.h){ pickChoice(i); return; }
  }
}

// ---------- Systems (each runs every frame over the entity list) ----------
// Move an entity by (mx,my) unit vector, resolving against walls
// one axis at a time so it slides along cover instead of sticking.
function moveWithWalls(e, mx, my, dt, speed){
  const s = (speed === undefined) ? e.speed : speed;   // dash passes a higher speed
  const nx = e.x + mx * s * dt;
  if (!circleHitsWall(nx, e.y, e.r)) e.x = nx;
  const ny = e.y + my * s * dt;
  if (!circleHitsWall(e.x, ny, e.r)) e.y = ny;
}
// Fire signal from any frontend: keyboard (arrows/space), the mobile ATTACK
// button (fireHeld), or a held desktop mouse (after a short delay so a quick
// click reads as a swap, not a shot).
function firing(){
  const kb = keys[' '];   // space shoots on desktop (arrows are movement; auto-aim handles direction)
  const mouseHold = mouseDown && (mouseDragged || (performance.now() - mouseStartT) > 150);
  return kb || fireHeld || mouseHold;
}

function sysHeroControl(dt){
  if(hero.dead) return;
  // ability cooldown + i-frame timers (same pattern as weapon cooldowns)
  if(hero.ability && hero.ability.cooldownLeft > 0) hero.ability.cooldownLeft -= dt;
  if(hero.invulnTimer > 0){ hero.invulnTimer -= dt; if(hero.invulnTimer <= 0) hero.invuln = false; }

  // movement input (also the dash's direction source at trigger time)
  let mx=0, my=0;
  if(keys['a']||keys['arrowleft'])  mx-=1;   // WASD or arrows move
  if(keys['d']||keys['arrowright']) mx+=1;
  if(keys['w']||keys['arrowup'])    my-=1;
  if(keys['s']||keys['arrowdown'])  my+=1;
  if(moveVec.active){ mx+=moveVec.x; my+=moveVec.y; }
  const len = Math.hypot(mx,my);
  if(len>0){ mx/=len; my/=len; }
  hero.lastMoveX = len>0 ? mx : 0; hero.lastMoveY = len>0 ? my : 0;

  if(hero.dashTimer > 0){
    // DASH overrides normal control: slide along the locked vector (walls respected)
    hero.dashTimer -= dt;
    moveWithWalls(hero, hero.dashX, hero.dashY, dt, hero.dashSpeed);
  } else if(len>0){
    moveWithWalls(hero, mx, my, dt);
  }

  // aim: track nearest enemy; if none, face the movement direction
  const target = nearest(hero, 'enemy');
  if(target){ const dx=target.x-hero.x, dy=target.y-hero.y, l=Math.hypot(dx,dy)||1; hero.aimX=dx/l; hero.aimY=dy/l; }
  else if(len>0){ hero.aimX=mx; hero.aimY=my; }

  // energy regen — ramps the longer the hero can't afford a ranged shot,
  // so you're never permanently locked out (melee covers the gap).
  const rw = rangedOf(hero);
  if(rw && hero.energy < rw.manaCost) hero.starveTimer += dt; else hero.starveTimer = 0;
  const regen = Math.min(ENERGY_REGEN_MAX, ENERGY_REGEN_BASE + ENERGY_REGEN_RAMP*hero.starveTimer);
  hero.energy = Math.min(hero.maxEnergy, hero.energy + regen*dt);

  // tick the transient melee swing visual
  if(hero.meleeFx){ hero.meleeFx.t -= dt; if(hero.meleeFx.t <= 0) hero.meleeFx = null; }

  // weapons: tick every weapon's cooldown, fire the active one while held
  for(const w of hero.weapons) if(w.cooldownLeft > 0) w.cooldownLeft -= dt;
  if(firing()) fireActive();
}

// ---------- Enemy brain seam (decide) + enemy system (act) ----------
// A brain DECIDES an action {moveX, moveY, attack} from an observation (ctx);
// it never touches the world. The enemy SYSTEM below APPLIES the action. This
// (observation -> action) split is exactly the seam an RL policy slots into
// later with no game rewrite — scripted brains now, same contract.
function chargerBrain(e, ctx){
  // rush straight at the hero; contact damage is applied passively by the system
  return { moveX: ctx.ux, moveY: ctx.uy, attack: false };
}
function kiterBrain(e, ctx){
  // hold a preferred distance: back off if too close, approach if too far
  let mx = 0, my = 0;
  if(ctx.dist < e.preferred - 8){ mx = -ctx.ux; my = -ctx.uy; }
  else if(ctx.dist > e.preferred + 8){ mx = ctx.ux; my = ctx.uy; }
  // request a shot when the hero is in range (the system gates it by cooldown)
  return { moveX: mx, moveY: my, attack: ctx.dist < e.shootRange };
}
function heavyBrain(e, ctx){
  // approach slowly; request the heavy attack when close. The system plays out
  // the telegraphed wind-up and the hit; the enemy stands still during wind-up.
  return { moveX: ctx.ux, moveY: ctx.uy, attack: ctx.dist < e.windRange };
}
// Execute an enemy's special attack (env side, branches per kind). Charger has
// none — it uses contact damage. Kiter/heavy plug in here.
function enemyAttack(e, ctx){
  if(e.kind === 'kiter'){
    // fire an enemy bullet straight at the hero (reuses the projectile system)
    add(makeBullet(e.x, e.y, ctx.ux, ctx.uy, 'enemy', e.shotDmg, e.shotSpeed, e.shotRadius));
    e.attackCdLeft = e.attackCooldown;
  } else if(e.kind === 'heavy'){
    // begin the telegraphed wind-up; the system delivers the hit when it ends
    e.windupLeft = e.windup;
    e.attackCdLeft = e.attackCooldown;   // cooldown counts from wind-up start
  }
}
function sysEnemies(dt){
  for(const e of entities){
    if(e.tag!=='enemy'||e.dead) continue;
    // observation: the enemy's view of the world
    const dx=hero.x-e.x, dy=hero.y-e.y, dist=Math.hypot(dx,dy)||1;
    const ctx = { hero, dx, dy, dist, ux:dx/dist, uy:dy/dist };
    if(e.attackCdLeft > 0) e.attackCdLeft -= dt;
    // heavy: committed telegraphed wind-up -> hit (player reads it and dodges)
    if(e.windupLeft > 0){
      e.windupLeft -= dt;
      if(e.windupLeft <= 0){
        const d = Math.hypot(hero.x-e.x, hero.y-e.y);
        if(!hero.dead && !hero.invuln && d < e.hitRange){
          hero.hp -= e.heavyDmg; if(hero.hp<=0){ hero.hp=0; hero.dead=true; }
        }
      }
      continue;   // committed during wind-up: no movement or new decision
    }
    // DECIDE
    const act = e.brain(e, ctx);
    // ACT — movement (straight-line; may stick on walls, accepted)
    if(act.moveX || act.moveY){
      const l = Math.hypot(act.moveX, act.moveY) || 1;
      moveWithWalls(e, act.moveX/l, act.moveY/l, dt);
    }
    // ACT — special attack intent (env gates by cooldown, executes per kind)
    if(act.attack && e.attackCdLeft <= 0) enemyAttack(e, ctx);
    // passive contact damage (charger), gated on dash i-frames
    if(e.touchDmg > 0){
      e.touchCooldown -= dt;
      if(!hero.dead && !hero.invuln && dist < e.r+hero.r && e.touchCooldown<=0){
        hero.hp -= e.touchDmg; e.touchCooldown = 0.6;
        if(hero.hp<=0){ hero.hp=0; hero.dead=true; }
      }
    }
  }
}

function sysBullets(dt){
  for(const b of entities){
    if(b.tag!=='bullet'||b.dead) continue;
    b.x += b.vx*b.speed*dt;
    b.y += b.vy*b.speed*dt;
    b.life -= dt;
    if(b.life<=0){ b.dead=true; continue; }
    // walls are cover: a bullet that steps into a wall cell dies.
    // Per-step cell check (no raycast) is enough — step << tile.
    if(isWallPx(b.x, b.y)){ b.dead=true; continue; }
    // collision: hero bullets hit enemies
    if(b.owner==='hero'){
      for(const e of entities){
        if(e.tag!=='enemy'||e.dead) continue;
        if(Math.hypot(b.x-e.x,b.y-e.y) < b.r+e.r){
          hurtEnemy(e, b.dmg); b.dead=true;
          break;
        }
      }
    } else if(b.owner==='enemy'){
      // enemy bullets hit the hero, gated on dash i-frames (melee also blocks them)
      if(!hero.dead && !hero.invuln && Math.hypot(b.x-hero.x, b.y-hero.y) < b.r+hero.r){
        hero.hp -= b.dmg; b.dead = true;
        if(hero.hp<=0){ hero.hp=0; hero.dead=true; }
      }
    }
  }
}

// Energy orbs dropped by kills: drift toward the hero when close,
// collected on contact.
function sysOrbs(dt){
  for(const o of entities){
    if(o.tag!=='orb'||o.dead) continue;
    const dx=hero.x-o.x, dy=hero.y-o.y, d=Math.hypot(dx,dy)||1;
    if(d < ORB_MAGNET){ o.x += (dx/d)*ORB_PULL*dt; o.y += (dy/d)*ORB_PULL*dt; }
    if(d < hero.r + o.r + 2){
      hero.energy = Math.min(hero.maxEnergy, hero.energy + o.value);
      o.dead = true;
    }
  }
}

function sysCleanup(){
  entities = entities.filter(e => !e.dead);
  // room cleared -> go to the intermission (NOT straight to a new
  // wave). The state machine owns wave progression now.
  if(round.state==='COMBAT' && !hero.dead && !entities.some(e=>e.tag==='enemy')){
    enterIntermission();
  }
}

function sysIntermission(dt){
  round.timer -= dt;
  if(round.timer <= 0) startCombat();   // time out -> forfeit the pick
}

// helper: nearest entity of a tag
function nearest(from, tag){
  let best=null, bd=Infinity;
  for(const e of entities){
    if(e.tag!==tag||e.dead) continue;
    const d=Math.hypot(e.x-from.x,e.y-from.y);
    if(d<bd){ bd=d; best=e; }
  }
  return best;
}

// ---------- Render ----------
function rrect(x,y,w,h,rad){
  ctx.beginPath();
  ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad);
  ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad);
  ctx.arcTo(x,y,x+w,y,rad);
  ctx.closePath();
}
function drawMap(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]===WALL){
      ctx.fillStyle='#23232f';
      ctx.fillRect(c*TILE, r*TILE, TILE, TILE);
      ctx.fillStyle='#2e2e3e';                 // top edge -> reads as cover
      ctx.fillRect(c*TILE, r*TILE, TILE, 3);
    }
  }
}
function draw(){
  ctx.clearRect(0,0,VW,VH);
  drawMap();

  // melee swing arc (fades out), under the entities
  if(hero.meleeFx && !hero.dead){
    const f=hero.meleeFx, a=Math.max(0, f.t/f.tMax);
    ctx.fillStyle='rgba(180,220,255,'+(0.30*a)+')';
    ctx.beginPath();
    ctx.moveTo(hero.x, hero.y);
    ctx.arc(hero.x, hero.y, f.radius, f.angle-f.half, f.angle+f.half);
    ctx.closePath(); ctx.fill();
  }

  for(const e of entities){
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
    ctx.fill();
    // enemy hp pips
    if(e.tag==='enemy'){
      const w=22, h=3, x=e.x-w/2, y=e.y-e.r-7;
      ctx.fillStyle='#000'; ctx.fillRect(x,y,w,h);
      ctx.fillStyle='#ff5a78'; ctx.fillRect(x,y,w*(e.hp/e.maxHp),h);
      // heavy wind-up telegraph: a growing red ring the player reads and dodges
      if(e.windupLeft > 0){
        const f = 1 - e.windupLeft/e.windup;
        ctx.strokeStyle = 'rgba(255,70,70,'+(0.4+0.5*f)+')'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 3 + 10*f, 0, Math.PI*2); ctx.stroke();
      }
    }
    // orb glow ring (reads as a collectible)
    if(e.tag==='orb'){
      ctx.strokeStyle='rgba(124,255,208,0.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r+3, 0, Math.PI*2); ctx.stroke();
    }
    // i-frame ring while dashing (reads as "can't be hit right now")
    if(e===hero && hero.invuln){
      ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r+3, 0, Math.PI*2); ctx.stroke();
    }
  }

  // HUD: HP bar (top), energy bar just under it
  ctx.fillStyle='#000'; ctx.fillRect(12,12,VW-24,10);
  ctx.fillStyle='#5ad1ff'; ctx.fillRect(12,12,(VW-24)*(hero.hp/hero.maxHp),10);
  ctx.fillStyle='#000'; ctx.fillRect(12,24,VW-24,5);
  ctx.fillStyle='#7cffd0'; ctx.fillRect(12,24,(VW-24)*(hero.energy/hero.maxEnergy),5);
  // wave counter + active weapon
  ctx.fillStyle='#778'; ctx.font='11px monospace'; ctx.textAlign='left';
  ctx.fillText('WAVE '+round.wave, 12, 42);
  const aw = hero.weapons[hero.activeWeapon];
  ctx.textAlign='right';
  ctx.fillStyle = aw.kind==='melee' ? '#bcd8ff' : '#fff2a8';
  ctx.fillText(aw.name.toUpperCase()+' ['+aw.kind+']', VW-12, 42);
  const dab = hero.ability;   // minimal dash-cooldown readout (desktop has no on-screen button)
  ctx.fillStyle = (dab && dab.cooldownLeft<=0) ? '#7cffd0' : '#5b5b6e';
  ctx.fillText(dab ? ('DASH '+(dab.cooldownLeft<=0 ? 'READY' : dab.cooldownLeft.toFixed(1)+'s')) : '', VW-12, 56);

  if(round.state==='INTERMISSION' && !hero.dead) drawIntermission();

  if(hero.dead){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,VW,VH);
    ctx.fillStyle='#fff'; ctx.font='24px monospace'; ctx.textAlign='center';
    ctx.fillText('YOU DIED', VW/2, VH/2-10);
    ctx.font='14px monospace';
    ctx.fillText('reached wave '+round.wave, VW/2, VH/2+14);
    ctx.fillText('tap / click / R to restart', VW/2, VH/2+36);
  }

  drawControls();
}
function drawIntermission(){
  ctx.fillStyle='rgba(8,8,12,0.62)'; ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='16px monospace';
  ctx.fillText('WAVE '+round.wave+' CLEARED', VW/2, 110);
  ctx.fillStyle='#8a8aa0'; ctx.font='12px monospace';
  ctx.fillText('choose one  ·  '+Math.ceil(round.timer)+'s', VW/2, 134);
  choiceRects.forEach((cr, i) => {
    ctx.fillStyle='#1c1c28'; rrect(cr.x, cr.y, cr.w, cr.h, 8); ctx.fill();
    ctx.strokeStyle='#3a3a4f'; ctx.lineWidth=1.5; rrect(cr.x, cr.y, cr.w, cr.h, 8); ctx.stroke();
    ctx.textAlign='left';
    ctx.fillStyle='#5ad1ff'; ctx.font='14px monospace';
    ctx.fillText((i+1)+'.  '+cr.choice.name, cr.x+14, cr.y+25);
    ctx.fillStyle='#aab'; ctx.font='11px monospace';
    ctx.fillText(cr.choice.desc, cr.x+14, cr.y+44);
  });
}

// On-screen mobile controls: a translucent overlay drawn last. Shown only on
// touch devices and only during active combat (menus are handled by taps).
function drawControls(){
  if(!TOUCH || hero.dead || round.state !== 'COMBAT') return;
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // joystick: faint home ring when idle; live ring + stick while dragging
  if(JOY.active){
    ctx.globalAlpha = 0.22; ctx.strokeStyle = '#cfe8ff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(JOY.baseX, JOY.baseY, JOY.r, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 0.40; ctx.fillStyle = '#cfe8ff';
    ctx.beginPath(); ctx.arc(JOY.curX, JOY.curY, JOY.kr, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.globalAlpha = 0.12; ctx.strokeStyle = '#cfe8ff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(70, VH-72, JOY.r, 0, Math.PI*2); ctx.stroke();
  }
  const button = (b, lit, pressed) => {
    ctx.globalAlpha = pressed ? 0.55 : (lit ? 0.34 : 0.16);
    ctx.fillStyle = '#9fd6ff';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = lit ? 0.95 : 0.45; ctx.fillStyle = '#0c0c12'; ctx.font = 'bold 10px monospace';
    ctx.fillText(b.label, b.x, b.y);
  };
  button(BTN.attack, true, fireHeld);
  const ab = hero.ability, abReady = !!ab && ab.cooldownLeft <= 0;
  button(BTN.ability, abReady, false);   // lit when ready, dim while recharging
  if(ab && ab.cooldownLeft > 0){         // radial cooldown sweep, shrinks as it recharges
    const frac = ab.cooldownLeft / ab.cooldown;
    ctx.globalAlpha = 0.5; ctx.fillStyle = '#0c0c12';
    ctx.beginPath(); ctx.moveTo(BTN.ability.x, BTN.ability.y);
    ctx.arc(BTN.ability.x, BTN.ability.y, BTN.ability.r, -Math.PI/2, -Math.PI/2 + Math.PI*2*frac);
    ctx.closePath(); ctx.fill();
  }
  button(BTN.swap, true, false);
  ctx.restore();
}

// ---------- Game loop (fixed timestep) ----------
const STEP = 1/60;          // simulate at 60 Hz regardless of refresh rate
let acc=0, last=performance.now();
function loop(now){
  acc += Math.min((now-last)/1000, 0.1);  // clamp to avoid spiral after tab-out
  last = now;
  while(acc >= STEP){
    if(!hero.dead){
      if(round.state==='COMBAT'){
        sysHeroControl(STEP);
        sysEnemies(STEP);
        sysBullets(STEP);
        sysOrbs(STEP);
        sysCleanup();
      } else { // INTERMISSION: combat paused, just tick the timer
        sysIntermission(STEP);
      }
    }
    acc -= STEP;
  }
  draw();
  requestAnimationFrame(loop);
}
resetWorld();
requestAnimationFrame(loop);
</script>
