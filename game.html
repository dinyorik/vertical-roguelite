<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Core</title>
<style>
  html,body{margin:0;height:100%;background:#0d0d12;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#16161e;display:block;}
  #hint{position:fixed;bottom:8px;left:0;right:0;text-align:center;
    color:#555;font:12px monospace;pointer-events:none;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hint">move: drag / WASD &nbsp;·&nbsp; shoot: hold / arrows &nbsp;·&nbsp; swap: tap / Q &nbsp;·&nbsp; pick: 1-3</div>
<script>
// ============================================================
//  VERTICAL ROGUELITE — CORE SKELETON
//  Everything on screen is an Entity with components.
//  A hero, an enemy, and a bullet are the SAME thing with
//  different components. This is the part to understand first.
//
//  Prior iteration: tile-grid map, cover walls, COMBAT/INTERMISSION
//  wave loop, between-wave upgrade pick.
//
//  PHASE 1 — combat core:
//   - Weapons are DATA ({kind, damage, cooldown, manaCost, ...}); one
//     fire system dispatches on `kind`. Hero holds TWO weapons, one
//     active; tap / Q / Tab swaps.
//   - ranged: spawns projectiles, costs energy. melee: a free arc
//     swing that damages enemies AND destroys enemy bullets in the
//     arc (attack + shield).
//   - energy economy: ranged spends energy; energy drops from kills
//     (collectible orbs) and regenerates passively, ramping the
//     longer you're starved so you're never locked out of ranged.
//  Projectile params are read from weapon data so later buffs can
//  modify them at spawn without touching the fire path.
// ============================================================

// ---------- Canvas (portrait, fits iPhone) ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
// logical resolution — game thinks in these units, not pixels
const VW = 360, VH = 640;            // virtual width/height (portrait)
function fit() {
  const scale = Math.min(window.innerWidth / VW, window.innerHeight / VH);
  canvas.width = VW; canvas.height = VH;                 // internal pixels
  canvas.style.width = (VW * scale) + 'px';             // displayed size
  canvas.style.height = (VH * scale) + 'px';
}
fit(); window.addEventListener('resize', fit);

// ============================================================
//  TILE GRID
//  The map is a 2D array of cells, each FLOOR or WALL. ALL
//  collision/geometry goes through this grid (never arbitrary
//  rectangles) so it can later be fed to an RL agent as an array
//  and support grid pathfinding. 18px tiles divide the 360-wide
//  canvas exactly (20 cols). 35 rows = 630px tall; the lower
//  ~10px is covered by the bottom wall border so it never shows.
// ============================================================
const TILE = 18;
const COLS = Math.floor(VW / TILE);   // 20
const ROWS = Math.floor(VH / TILE);   // 35
const FLOOR = 0, WALL = 1;
let grid = [];                        // grid[row][col]

// pixel -> cell helpers. Out-of-bounds counts as WALL so the
// world edge needs no special-casing.
const cellOf = px => Math.floor(px / TILE);
function isWallCell(c, r){
  if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return true;
  return grid[r][c] === WALL;
}
const isWallPx = (x, y) => isWallCell(cellOf(x), cellOf(y));
// A circle hits a wall if its centre OR any of its 4 cardinal
// edge points is in a wall cell. 5 O(1) lookups — NOT a loop
// over every wall (that's the thing the grid exists to avoid).
function circleHitsWall(x, y, r){
  return isWallPx(x, y)
      || isWallPx(x - r, y) || isWallPx(x + r, y)
      || isWallPx(x, y - r) || isWallPx(x, y + r);
}
const cellCenter = (c, r) => ({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2 });
const ri = n => Math.floor(Math.random() * n);   // random int 0..n-1
// smallest absolute angle between two headings (handles wraparound)
function angleDiff(a, b){ let d = Math.abs(a - b) % (Math.PI * 2); if (d > Math.PI) d = Math.PI * 2 - d; return d; }

// ---------- Map generation ----------
// Primitive cover: a border ring of wall, then 4-8 scattered
// rect / L-shaped obstacles. NOT a maze, NOT a dungeon. Two hard
// rules: a safe zone around the hero stays floor, and the map is
// fully connected (verified by flood-fill; regenerate if not).
function blankGrid(){
  grid = [];
  for (let r = 0; r < ROWS; r++){
    const row = [];
    for (let c = 0; c < COLS; c++){
      const border = (c === 0 || r === 0 || c === COLS - 1 || r === ROWS - 1);
      row.push(border ? WALL : FLOOR);
    }
    grid.push(row);
  }
}
function carveSafeZone(c, r, rad){
  // force a floor pocket around a cell (keep the outer border intact)
  for (let y = Math.max(1, r - rad); y <= Math.min(ROWS - 2, r + rad); y++)
    for (let x = Math.max(1, c - rad); x <= Math.min(COLS - 2, c + rad); x++)
      grid[y][x] = FLOOR;
}
function placeObstacle(){
  const w = 2 + ri(3), h = 2 + ri(3);              // 2..4 tiles each side
  const c0 = 1 + ri(COLS - 2 - w);                 // stay off the border
  const r0 = 1 + ri(ROWS - 2 - h);
  for (let r = r0; r < r0 + h; r++)
    for (let c = c0; c < c0 + w; c++)
      grid[r][c] = WALL;
  // 50% of the time bite one corner back to floor -> an L / notch
  if (Math.random() < 0.5){
    const cw = 1 + ri(w - 1), ch = 1 + ri(h - 1);
    const cornerC = Math.random() < 0.5 ? c0 : c0 + w - cw;
    const cornerR = Math.random() < 0.5 ? r0 : r0 + h - ch;
    for (let r = cornerR; r < cornerR + ch; r++)
      for (let c = cornerC; c < cornerC + cw; c++)
        grid[r][c] = FLOOR;
  }
}
// Flood-fill of reachable FLOOR cells from a start cell (4-dir).
function floodReachable(sc, sr){
  const seen = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
  const cells = [];
  if (grid[sr][sc] !== FLOOR) return { seen, cells };
  const stack = [[sc, sr]]; seen[sr][sc] = true;
  while (stack.length){
    const [c, r] = stack.pop(); cells.push([c, r]);
    const nb = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dc, dr] of nb){
      const nc = c + dc, nr = r + dr;
      if (nc < 0 || nr < 0 || nc >= COLS || nr >= ROWS) continue;
      if (seen[nr][nc] || grid[nr][nc] !== FLOOR) continue;
      seen[nr][nc] = true; stack.push([nc, nr]);
    }
  }
  return { seen, cells };
}
function countFloor(){
  let n = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === FLOOR) n++;
  return n;
}
// Build a connected map with the hero's cell guaranteed floor.
// Returns the list of reachable floor cells (used for spawns).
function generateMap(heroC, heroR){
  for (let attempt = 0; attempt < 30; attempt++){
    blankGrid();
    const k = 4 + ri(5);                 // 4..8 obstacles
    for (let i = 0; i < k; i++) placeObstacle();
    carveSafeZone(heroC, heroR, 2);      // never trap the hero
    const { cells } = floodReachable(heroC, heroR);
    // connected == every floor cell was reached from the hero
    if (cells.length === countFloor()) return cells;
  }
  // Fallback: border-only arena is trivially connected.
  blankGrid();
  carveSafeZone(heroC, heroR, 2);
  return floodReachable(heroC, heroR).cells;
}

// ---------- Input ----------
const keys = {};
// touch: drag to move (holding = shooting); a quick still tap = swap weapon
let touchMove = {x:0, y:0, active:false};
let touchOrigin = null;
let touchStartT = 0;       // when the current touch began (for tap detection)
let touchDragged = false;  // did this touch move far enough to be a drag?
function toLocal(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)/(r.width/VW), y:(t.clientY-r.top)/(r.height/VH) };
}
canvas.addEventListener('touchstart', e=>{ e.preventDefault();
  const p = toLocal(e.touches[0]);
  if (hero.dead){ resetWorld(); return; }            // tap to restart
  if (round.state === 'INTERMISSION'){ tapChoice(p.x, p.y); return; }
  // COMBAT: begin a movement drag (also a possible tap-to-swap)
  touchOrigin = p; touchMove.active = true;
  touchStartT = performance.now(); touchDragged = false;
},{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault();
  if (round.state !== 'COMBAT' || !touchOrigin) return;
  const p = toLocal(e.touches[0]);
  let dx = p.x-touchOrigin.x, dy = p.y-touchOrigin.y;
  const len = Math.hypot(dx,dy)||1;
  if(len>8) touchDragged = true;
  if(len>4){ touchMove.x = dx/len; touchMove.y = dy/len; }
  else { touchMove.x = 0; touchMove.y = 0; }
},{passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault();
  // a quick, still tap during combat = swap weapon
  if(round.state==='COMBAT' && !hero.dead && !touchDragged && (performance.now()-touchStartT) < 220)
    swapWeapon();
  touchOrigin=null; touchMove={x:0,y:0,active:false};
},{passive:false});

// mouse mirrors touch so the game is fully playable on desktop — this is
// also what makes "tap / click to restart" work with a mouse.
canvas.addEventListener('mousedown', e=>{
  const p = toLocal(e);
  if (hero.dead){ resetWorld(); return; }            // click to restart
  if (round.state === 'INTERMISSION'){ tapChoice(p.x, p.y); return; }
  touchOrigin = p; touchMove.active = true;
  touchStartT = performance.now(); touchDragged = false;
});
canvas.addEventListener('mousemove', e=>{
  if (round.state !== 'COMBAT' || !touchOrigin) return;
  const p = toLocal(e);
  let dx = p.x-touchOrigin.x, dy = p.y-touchOrigin.y;
  const len = Math.hypot(dx,dy)||1;
  if(len>8) touchDragged = true;
  if(len>4){ touchMove.x = dx/len; touchMove.y = dy/len; }
  else { touchMove.x = 0; touchMove.y = 0; }
});
window.addEventListener('mouseup', ()=>{   // window: releasing off-canvas still ends the drag
  if(round.state==='COMBAT' && !hero.dead && !touchDragged && (performance.now()-touchStartT) < 220)
    swapWeapon();                          // quick still click = swap (mirrors tap)
  touchOrigin=null; touchMove={x:0,y:0,active:false};
});

addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (hero.dead && k === 'r'){ resetWorld(); return; }
  if (round.state === 'INTERMISSION'){
    if (k === '1') pickChoice(0);
    else if (k === '2') pickChoice(1);
    else if (k === '3') pickChoice(2);
    return;
  }
  if (round.state === 'COMBAT' && (k === 'q' || k === 'tab')){ e.preventDefault(); swapWeapon(); }
});
addEventListener('keyup', e=> keys[e.key.toLowerCase()] = false);

// ---------- World: just a flat list of entities ----------
let entities = [];
const add = e => { entities.push(e); return e; };

// ============================================================
//  WEAPONS (data-driven)
//  A weapon is plain data + a `kind`. fireActive() dispatches on
//  kind. The hero holds an array of weapons and an active index.
//  Projectile params live on the weapon (not the hero) so a later
//  buff can change bullet size/count/speed at spawn time.
// ============================================================
function makeRanged(){
  return {
    kind:'ranged', name:'Blaster',
    damage:12, cooldown:0.18, cooldownLeft:0,
    manaCost:6,                       // energy spent per shot
    bulletSpeed:380, bulletCount:1, spread:0.30, bulletRadius:4,
  };
}
function makeMelee(){
  return {
    kind:'melee', name:'Blade',
    damage:26, cooldown:0.34, cooldownLeft:0,
    manaCost:0,                       // melee is always free
    arcRadius:46, arcHalf:1.0,        // reach (px) + half-angle (rad ~57deg each side)
  };
}

// ---------- Energy economy tunables (placeholders — tune by feel) ----------
const ENERGY_REGEN_BASE = 8;     // energy/sec baseline regen
const ENERGY_REGEN_RAMP = 14;    // extra energy/sec for each second starved
const ENERGY_REGEN_MAX  = 70;    // cap on regen rate
const ORB_VALUE = 10;            // energy restored per pickup
const ORB_MAGNET = 46;           // px: orbs within this drift toward hero
const ORB_PULL   = 170;          // px/sec orb drift speed

// Factory functions build entities by composing components.
// Components are just data fields — behaviour lives in systems below.
function makeHero(){
  return {
    tag:'hero',
    x:VW/2, y:VH*0.75, r:9,
    vx:0, vy:0, speed:140,
    hp:100, maxHp:100,
    energy:100, maxEnergy:100, starveTimer:0,
    weapons:[ makeRanged(), makeMelee() ],
    activeWeapon:0,
    aimX:0, aimY:-1,                  // last aim direction (melee faces this)
    meleeFx:null,                     // transient swing visual {angle,half,radius,t,tMax}
    color:'#5ad1ff', dead:false,
  };
}
function makeEnemy(x,y){
  return {
    tag:'enemy',
    x, y, r:9,
    speed:55,
    hp:30, maxHp:30,
    touchDmg:10, touchCooldown:0,
    color:'#ff5a78', dead:false,
  };
}
function makeBullet(x,y,dx,dy,owner,dmg,speed,radius){
  return {
    tag:'bullet',
    x, y, r:radius,
    vx:dx, vy:dy, speed:speed,
    life:1.2,                         // seconds before despawn
    dmg:dmg, owner,
    color: owner==='hero' ? '#fff2a8' : '#ff9a5a', dead:false,
  };
}
function spawnEnergyOrb(x, y){
  add({ tag:'orb', x, y, r:5, value:ORB_VALUE, dead:false, color:'#7cffd0' });
}

// ---------- Combat helpers ----------
// Apply damage to an enemy in ONE place, so every damage source
// (bullets, melee) shares the same death path — incl. dropping an
// energy orb on kill.
function hurtEnemy(e, dmg){
  if (e.dead) return;
  e.hp -= dmg;
  if (e.hp <= 0){ e.dead = true; spawnEnergyOrb(e.x, e.y); }
}
// Fire the active weapon if its cooldown is ready. Per-kind handlers
// return whether they actually fired, so we only spend the cooldown
// on a real action (ranged with no energy fires nothing).
function fireActive(){
  const w = hero.weapons[hero.activeWeapon];
  if (w.cooldownLeft > 0) return;
  let fired = false;
  if (w.kind === 'ranged') fired = fireRanged(w);
  else if (w.kind === 'melee') fired = fireMelee(w);
  if (fired) w.cooldownLeft = w.cooldown;
}
function fireRanged(w){
  if (hero.energy < w.manaCost) return false;     // not enough energy -> no shot
  hero.energy -= w.manaCost;
  // fan bulletCount pellets across `spread` radians around the aim
  const base = Math.atan2(hero.aimY, hero.aimX), n = w.bulletCount;
  for(let i=0;i<n;i++){
    const t = n===1 ? 0 : (i/(n-1) - 0.5);   // -0.5..0.5
    const a = base + t*w.spread;
    add(makeBullet(hero.x, hero.y, Math.cos(a), Math.sin(a), 'hero', w.damage, w.bulletSpeed, w.bulletRadius));
  }
  return true;
}
// Melee swing: one arc in the aim direction. Damages enemies in the
// arc AND destroys enemy bullets in the arc — it is attack + shield.
// (Enemy bullets don't exist until Phase 3; the block is built now.)
function fireMelee(w){
  const baseAngle = Math.atan2(hero.aimY, hero.aimX);
  for (const e of entities){
    if (e.dead) continue;
    if (e.tag !== 'enemy' && !(e.tag === 'bullet' && e.owner === 'enemy')) continue;
    const dx = e.x - hero.x, dy = e.y - hero.y, d = Math.hypot(dx, dy);
    if (d > w.arcRadius + e.r) continue;                       // out of reach
    if (angleDiff(Math.atan2(dy, dx), baseAngle) > w.arcHalf) continue;  // outside the arc
    if (e.tag === 'enemy') hurtEnemy(e, w.damage);
    else e.dead = true;                                        // enemy bullet blocked
  }
  hero.meleeFx = { angle:baseAngle, half:w.arcHalf, radius:w.arcRadius, t:0.12, tMax:0.12 };
  return true;
}
function swapWeapon(){
  if (hero.dead) return;
  hero.activeWeapon = (hero.activeWeapon + 1) % hero.weapons.length;
}

// ============================================================
//  ROUND STATE MACHINE
//  COMBAT --(all enemies dead)--> INTERMISSION (10s, paused,
//  pick an upgrade) --> COMBAT (next wave, new map). Explicit
//  state, not ad-hoc flags: floors and bosses-every-N-waves will
//  hang off this later.
// ============================================================
const INTERMISSION_TIME = 10;
const round = { state:'COMBAT', timer:0, wave:0 };
let hero;

function resetWorld(){
  entities = [];
  hero = add(makeHero());
  round.wave = 0;
  startCombat();
}
// Begin a wave: drop everything but the hero, build a fresh map
// around wherever the hero is standing, spawn enemies on it.
function startCombat(){
  round.wave++;
  entities = entities.filter(e => e.tag === 'hero');
  const hc = cellOf(hero.x), hr = cellOf(hero.y);
  const reachable = generateMap(hc, hr);
  spawnWave(Math.min(4 + round.wave, 14), reachable, hc, hr);
  round.state = 'COMBAT';
}
function enterIntermission(){
  round.state = 'INTERMISSION';
  round.timer = INTERMISSION_TIME;
  // clear shots and uncollected orbs so they don't carry across waves
  entities = entities.filter(e => e.tag !== 'bullet' && e.tag !== 'orb');
  touchMove = {x:0,y:0,active:false}; touchOrigin = null;
  rollChoices();
}
// Enemies spawn only on reachable floor cells, kept away from the
// hero so they don't appear on top of the player.
function spawnWave(n, reachable, hc, hr){
  let far = reachable.filter(([c,r]) => Math.hypot(c-hc, r-hr) >= 6);
  if (far.length < n) far = reachable.filter(([c,r]) => Math.hypot(c-hc, r-hr) >= 3);
  if (far.length === 0) far = reachable.slice();
  for (let i = 0; i < n; i++){
    const [c, r] = far[ri(far.length)];
    const p = cellCenter(c, r);
    add(makeEnemy(p.x, p.y));
  }
}

// ---------- Between-wave choices ----------
// Hardcoded pool. No currency, no shop — pick one, it applies,
// next wave. Weapon upgrades target the ranged weapon's data.
const rangedOf = h => h.weapons.find(w => w.kind === 'ranged');
const CHOICE_POOL = [
  { name:'+ Damage',    desc:'+6 ranged damage',   apply:h => { rangedOf(h).damage += 6; } },
  { name:'+ Fire Rate', desc:'20% faster ranged',  apply:h => { const w=rangedOf(h); w.cooldown = Math.max(0.05, w.cooldown * 0.8); } },
  { name:'Heal',        desc:'restore 40 HP',      apply:h => { h.hp = Math.min(h.maxHp, h.hp + 40); } },
  { name:'+ Vigor',     desc:'+20 max HP & heal',  apply:h => { h.maxHp += 20; h.hp += 20; } },
];
let choices = [];        // the 3 offered this intermission
let choiceRects = [];    // their on-screen hitboxes (for tapping)
function rollChoices(){
  const pool = CHOICE_POOL.slice();
  choices = [];
  for (let i = 0; i < 3 && pool.length; i++)
    choices.push(pool.splice(ri(pool.length), 1)[0]);
  // layout: stacked cards, centred
  choiceRects = choices.map((ch, i) => ({
    x: 28, y: 170 + i * 74, w: VW - 56, h: 60, choice: ch,
  }));
}
function pickChoice(i){
  if (round.state !== 'INTERMISSION') return;
  const ch = choices[i];
  if (!ch) return;
  ch.apply(hero);
  startCombat();
}
function tapChoice(x, y){
  for (let i = 0; i < choiceRects.length; i++){
    const c = choiceRects[i];
    if (x >= c.x && x <= c.x + c.w && y >= c.y && y <= c.y + c.h){ pickChoice(i); return; }
  }
}

// ---------- Systems (each runs every frame over the entity list) ----------
// Move an entity by (mx,my) unit vector, resolving against walls
// one axis at a time so it slides along cover instead of sticking.
function moveWithWalls(e, mx, my, dt){
  const nx = e.x + mx * e.speed * dt;
  if (!circleHitsWall(nx, e.y, e.r)) e.x = nx;
  const ny = e.y + my * e.speed * dt;
  if (!circleHitsWall(e.x, ny, e.r)) e.y = ny;
}
// touch fires only once it's a hold/drag, so a quick tap (swap) doesn't shoot
function firing(){
  const kb = keys['arrowup']||keys['arrowdown']||keys['arrowleft']||keys['arrowright']||keys[' '];
  const held = touchMove.active && (touchDragged || (performance.now() - touchStartT) > 150);
  return kb || held;
}

function sysHeroControl(dt){
  if(hero.dead) return;
  // movement
  let mx=0, my=0;
  if(keys['a']||keys['arrowleft'])  mx-=1;
  if(keys['d']||keys['arrowright']) mx+=1;
  if(keys['w']||keys['arrowup'])    my-=1;
  if(keys['s']||keys['arrowdown'])  my+=1;
  if(touchMove.active){ mx+=touchMove.x; my+=touchMove.y; }
  const len = Math.hypot(mx,my);
  if(len>0){ mx/=len; my/=len; moveWithWalls(hero, mx, my, dt); }

  // aim: track nearest enemy; if none, face the movement direction
  const target = nearest(hero, 'enemy');
  if(target){ const dx=target.x-hero.x, dy=target.y-hero.y, l=Math.hypot(dx,dy)||1; hero.aimX=dx/l; hero.aimY=dy/l; }
  else if(len>0){ hero.aimX=mx; hero.aimY=my; }

  // energy regen — ramps the longer the hero can't afford a ranged shot,
  // so you're never permanently locked out (melee covers the gap).
  const rw = rangedOf(hero);
  if(rw && hero.energy < rw.manaCost) hero.starveTimer += dt; else hero.starveTimer = 0;
  const regen = Math.min(ENERGY_REGEN_MAX, ENERGY_REGEN_BASE + ENERGY_REGEN_RAMP*hero.starveTimer);
  hero.energy = Math.min(hero.maxEnergy, hero.energy + regen*dt);

  // tick the transient melee swing visual
  if(hero.meleeFx){ hero.meleeFx.t -= dt; if(hero.meleeFx.t <= 0) hero.meleeFx = null; }

  // weapons: tick every weapon's cooldown, fire the active one while held
  for(const w of hero.weapons) if(w.cooldownLeft > 0) w.cooldownLeft -= dt;
  if(firing()) fireActive();
}

function sysEnemyAI(dt){
  for(const e of entities){
    if(e.tag!=='enemy'||e.dead) continue;
    // dumb AI: walk toward hero (no pathfinding yet — getting
    // stuck on a wall is acceptable for now).
    let dx=hero.x-e.x, dy=hero.y-e.y; const l=Math.hypot(dx,dy)||1;
    moveWithWalls(e, dx/l, dy/l, dt);
    // contact damage (uses real distance, not the grid)
    e.touchCooldown -= dt;
    if(!hero.dead && Math.hypot(hero.x-e.x, hero.y-e.y) < e.r+hero.r && e.touchCooldown<=0){
      hero.hp -= e.touchDmg; e.touchCooldown = 0.6;
      if(hero.hp<=0){ hero.hp=0; hero.dead=true; }
    }
  }
}

function sysBullets(dt){
  for(const b of entities){
    if(b.tag!=='bullet'||b.dead) continue;
    b.x += b.vx*b.speed*dt;
    b.y += b.vy*b.speed*dt;
    b.life -= dt;
    if(b.life<=0){ b.dead=true; continue; }
    // walls are cover: a bullet that steps into a wall cell dies.
    // Per-step cell check (no raycast) is enough — step << tile.
    if(isWallPx(b.x, b.y)){ b.dead=true; continue; }
    // collision: hero bullets hit enemies
    if(b.owner==='hero'){
      for(const e of entities){
        if(e.tag!=='enemy'||e.dead) continue;
        if(Math.hypot(b.x-e.x,b.y-e.y) < b.r+e.r){
          hurtEnemy(e, b.dmg); b.dead=true;
          break;
        }
      }
    }
  }
}

// Energy orbs dropped by kills: drift toward the hero when close,
// collected on contact.
function sysOrbs(dt){
  for(const o of entities){
    if(o.tag!=='orb'||o.dead) continue;
    const dx=hero.x-o.x, dy=hero.y-o.y, d=Math.hypot(dx,dy)||1;
    if(d < ORB_MAGNET){ o.x += (dx/d)*ORB_PULL*dt; o.y += (dy/d)*ORB_PULL*dt; }
    if(d < hero.r + o.r + 2){
      hero.energy = Math.min(hero.maxEnergy, hero.energy + o.value);
      o.dead = true;
    }
  }
}

function sysCleanup(){
  entities = entities.filter(e => !e.dead);
  // room cleared -> go to the intermission (NOT straight to a new
  // wave). The state machine owns wave progression now.
  if(round.state==='COMBAT' && !hero.dead && !entities.some(e=>e.tag==='enemy')){
    enterIntermission();
  }
}

function sysIntermission(dt){
  round.timer -= dt;
  if(round.timer <= 0) startCombat();   // time out -> forfeit the pick
}

// helper: nearest entity of a tag
function nearest(from, tag){
  let best=null, bd=Infinity;
  for(const e of entities){
    if(e.tag!==tag||e.dead) continue;
    const d=Math.hypot(e.x-from.x,e.y-from.y);
    if(d<bd){ bd=d; best=e; }
  }
  return best;
}

// ---------- Render ----------
function rrect(x,y,w,h,rad){
  ctx.beginPath();
  ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad);
  ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad);
  ctx.arcTo(x,y,x+w,y,rad);
  ctx.closePath();
}
function drawMap(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]===WALL){
      ctx.fillStyle='#23232f';
      ctx.fillRect(c*TILE, r*TILE, TILE, TILE);
      ctx.fillStyle='#2e2e3e';                 // top edge -> reads as cover
      ctx.fillRect(c*TILE, r*TILE, TILE, 3);
    }
  }
}
function draw(){
  ctx.clearRect(0,0,VW,VH);
  drawMap();

  // melee swing arc (fades out), under the entities
  if(hero.meleeFx && !hero.dead){
    const f=hero.meleeFx, a=Math.max(0, f.t/f.tMax);
    ctx.fillStyle='rgba(180,220,255,'+(0.30*a)+')';
    ctx.beginPath();
    ctx.moveTo(hero.x, hero.y);
    ctx.arc(hero.x, hero.y, f.radius, f.angle-f.half, f.angle+f.half);
    ctx.closePath(); ctx.fill();
  }

  for(const e of entities){
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
    ctx.fill();
    // enemy hp pips
    if(e.tag==='enemy'){
      const w=22, h=3, x=e.x-w/2, y=e.y-e.r-7;
      ctx.fillStyle='#000'; ctx.fillRect(x,y,w,h);
      ctx.fillStyle='#ff5a78'; ctx.fillRect(x,y,w*(e.hp/e.maxHp),h);
    }
    // orb glow ring (reads as a collectible)
    if(e.tag==='orb'){
      ctx.strokeStyle='rgba(124,255,208,0.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r+3, 0, Math.PI*2); ctx.stroke();
    }
  }

  // HUD: HP bar (top), energy bar just under it
  ctx.fillStyle='#000'; ctx.fillRect(12,12,VW-24,10);
  ctx.fillStyle='#5ad1ff'; ctx.fillRect(12,12,(VW-24)*(hero.hp/hero.maxHp),10);
  ctx.fillStyle='#000'; ctx.fillRect(12,24,VW-24,5);
  ctx.fillStyle='#7cffd0'; ctx.fillRect(12,24,(VW-24)*(hero.energy/hero.maxEnergy),5);
  // wave counter + active weapon
  ctx.fillStyle='#778'; ctx.font='11px monospace'; ctx.textAlign='left';
  ctx.fillText('WAVE '+round.wave, 12, 42);
  const aw = hero.weapons[hero.activeWeapon];
  ctx.textAlign='right';
  ctx.fillStyle = aw.kind==='melee' ? '#bcd8ff' : '#fff2a8';
  ctx.fillText(aw.name.toUpperCase()+' ['+aw.kind+']', VW-12, 42);

  if(round.state==='INTERMISSION' && !hero.dead) drawIntermission();

  if(hero.dead){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,VW,VH);
    ctx.fillStyle='#fff'; ctx.font='24px monospace'; ctx.textAlign='center';
    ctx.fillText('YOU DIED', VW/2, VH/2-10);
    ctx.font='14px monospace';
    ctx.fillText('reached wave '+round.wave, VW/2, VH/2+14);
    ctx.fillText('tap / click / R to restart', VW/2, VH/2+36);
  }
}
function drawIntermission(){
  ctx.fillStyle='rgba(8,8,12,0.62)'; ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='16px monospace';
  ctx.fillText('WAVE '+round.wave+' CLEARED', VW/2, 110);
  ctx.fillStyle='#8a8aa0'; ctx.font='12px monospace';
  ctx.fillText('choose one  ·  '+Math.ceil(round.timer)+'s', VW/2, 134);
  choiceRects.forEach((cr, i) => {
    ctx.fillStyle='#1c1c28'; rrect(cr.x, cr.y, cr.w, cr.h, 8); ctx.fill();
    ctx.strokeStyle='#3a3a4f'; ctx.lineWidth=1.5; rrect(cr.x, cr.y, cr.w, cr.h, 8); ctx.stroke();
    ctx.textAlign='left';
    ctx.fillStyle='#5ad1ff'; ctx.font='14px monospace';
    ctx.fillText((i+1)+'.  '+cr.choice.name, cr.x+14, cr.y+25);
    ctx.fillStyle='#aab'; ctx.font='11px monospace';
    ctx.fillText(cr.choice.desc, cr.x+14, cr.y+44);
  });
}

// ---------- Game loop (fixed timestep) ----------
const STEP = 1/60;          // simulate at 60 Hz regardless of refresh rate
let acc=0, last=performance.now();
function loop(now){
  acc += Math.min((now-last)/1000, 0.1);  // clamp to avoid spiral after tab-out
  last = now;
  while(acc >= STEP){
    if(!hero.dead){
      if(round.state==='COMBAT'){
        sysHeroControl(STEP);
        sysEnemyAI(STEP);
        sysBullets(STEP);
        sysOrbs(STEP);
        sysCleanup();
      } else { // INTERMISSION: combat paused, just tick the timer
        sysIntermission(STEP);
      }
    }
    acc -= STEP;
  }
  draw();
  requestAnimationFrame(loop);
}
resetWorld();
requestAnimationFrame(loop);
</script>
